<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      operacao = Number(
        prompt(
          "escolha sua operação, digite 1 para adição, 2 para subtração, 3 para multiplicação e 4 para divisão",
        ),
      );
      // if verifica qual o valor da varíavel e fara uma ação com base no valor dela
      if (operacao === 1) {
        //o programa dentro das chaves so acontece caso operacao seja igual a 1
        alert("escolhido adição");
      } else if (operacao === 2) {
        alert("escolhido subtração");
      } else if (operacao === 3) {
        alert("escolhido multiplicação");
      } else if (operacao === 4) {
        alert("escolhido divisão");
      } else {
        alert("operação invalída escolhida");
      }
    </script>
  </body>
</html>
